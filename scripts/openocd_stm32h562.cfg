# openocd_stm32h562.cfg — Configuração OpenOCD para STM32H562RGT6
#
# Uso:
#   Gravação:   openocd -f scripts/openocd_stm32h562.cfg \
#                       -c "program build/openems.hex verify reset exit"
#
#   Debug GDB:  openocd -f scripts/openocd_stm32h562.cfg &
#               arm-none-eabi-gdb build/openems.elf \
#                   -ex "target remote :3333" \
#                   -ex "monitor reset halt"
#
# Hardware: ST-Link V2 ou V3 conectado via USB
# Pinos SWD no STM32H562RGT6:
#   PA13 = SWDIO  (pino 46 no LQFP64)
#   PA14 = SWDCLK (pino 49 no LQFP64)

# Interface: ST-Link (detecta V2/V3 automaticamente)
source [find interface/stlink.cfg]

# Protocolo: SWD (Serial Wire Debug) — mais rápido que JTAG para M33
transport select hla_swd

# Target: STM32H5 family (cobre H562, H563, H573)
source [find target/stm32h5x.cfg]

# Reset via SRST (System Reset pin)
# Se o pino NRST não estiver conectado, usar "connect_assert_srst"
reset_config srst_only

# Velocidade SWD: 4 MHz (conservador; aumentar para 8 MHz se estável)
adapter speed 4000

# Endereço base da Flash Bank1 (para verificação)
# STM32H562: Flash1 = 0x08000000, Flash2 = 0x08100000
# O OpenOCD detecta automaticamente pelo target stm32h5x.cfg

# Configuração opcional para debug ITM/SWO trace
# Descomente para habilitar trace via SWO (necessita ST-Link V3)
# tpiu config internal /tmp/swo.log uart false 250000000 2000000
