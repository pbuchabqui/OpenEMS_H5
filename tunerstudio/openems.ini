; OpenEMS minimal TunerStudio definition
; Use with "Custom / Other" project and serial port /dev/ttyACM0

[MegaTune]
signature = "OpenEMS_v1.1"
queryCommand = "H"
version = "2026.02"

[TunerStudio]
queryCommand = "H"
signature = "OpenEMS_v1.1"

[OutputChannels]
ochGetCommand = "O"
ochBlockSize = 64

; TsRealtimeData layout from src/app/tuner_studio.h
rpm        = scalar, U16,   0, "rpm", 1, 0
map_kpa    = scalar, U08,   2, "kPa", 1, 0
tps_pct    = scalar, U08,   3, "%", 1, 0
clt_c      = scalar, S08,   4, "C", 1, -40
iat_c      = scalar, S08,   5, "C", 1, -40
o2_mv      = scalar, U08,   6, "mV", 4, 0
advance    = scalar, U08,   8, "deg", 1, -40
ve_cell    = scalar, U08,   9, "%", 1, 0
status     = scalar, U08,  11, "", 1, 0

[Constants]
endianness = little
nPages = 3
pageSize = 512,256,256
pageIdentifier = "0","1","2"

; OpenEMS read/write protocol:
;   r [page:u8][offset:u16 le][len:u16 le]
;   w [page:u8][offset:u16 le][len:u16 le][data...]
pageReadCommand = "r%1i%2o%2c"
pageValueWrite = "w%1i%2o%2c%v"
